    PATH-LIN-004: "/etc/sudoers"
    PATH-LIN-005: "/etc/sudoers.d"
    PATH-LIN-006: "/home/*/.ssh"
    PATH-LIN-007: "/home/*/.gnupg"
    PATH-LIN-008: "/home/*/.aws"
    PATH-LIN-009: "/home/*/.azure"
    PATH-LIN-010: "/home/*/.config/gcloud"
    PATH-LIN-011: "/home/*/.kube/config"
    PATH-LIN-012: "/var/run/docker.sock"
    PATH-LIN-013: "/etc/clawedr"
    PATH-LIN-017: "/usr/local/share/clawedr"

