# ── Blocked paths ──────────────────────────────────────────────────────────
# Sensitive credential stores and system files an AI agent should never touch.

blocked_paths:
  macos:
    # Credential stores
    PATH-MAC-001: "~/.ssh"
    PATH-MAC-002: "~/.gnupg"
    PATH-MAC-003: "~/.aws"
    PATH-MAC-004: "~/.azure"
    PATH-MAC-005: "~/.config/gcloud"
    PATH-MAC-006: "~/.kube/config"
    PATH-MAC-007: "~/Library/Keychains"
    PATH-MAC-008: "/etc/master.passwd"
    # Browser credential / cookie databases
    PATH-MAC-009: "~/Library/Cookies"
    PATH-MAC-010: "~/Library/Application Support/Google/Chrome/Default/Login Data"
    PATH-MAC-011: "~/Library/Application Support/Google/Chrome/Default/Cookies"
    PATH-MAC-012: "~/Library/Application Support/Firefox/Profiles"
    PATH-MAC-013: "~/Library/Application Support/Arc/User Data/Default/Login Data"
    # Private user data
    PATH-MAC-014: "~/Library/Messages"
    PATH-MAC-015: "~/Library/Mail"
    PATH-MAC-016: "~/Library/Accounts"
    PATH-MAC-017: "~/Library/Calendars"
    PATH-MAC-018: "~/Library/Suggestions"
    # System
    PATH-MAC-019: "/Library/Preferences/SystemConfiguration"
  linux:
    PATH-LIN-001: "/root/.ssh"
    PATH-LIN-002: "/etc/shadow"
    # NOTE: /etc/passwd intentionally NOT blocked — it is world-readable and
    # accessed by every process via getpwuid(). Write-protection is handled
    # by deny rule LIN-038 (persistence_add_root_user).
    PATH-LIN-004: "/etc/sudoers"
    PATH-LIN-005: "/etc/sudoers.d"
    PATH-LIN-006: "/home/*/.ssh"
    PATH-LIN-007: "/home/*/.gnupg"
    PATH-LIN-008: "/home/*/.aws"
    PATH-LIN-009: "/home/*/.azure"
    PATH-LIN-010: "/home/*/.config/gcloud"
    PATH-LIN-011: "/home/*/.kube/config"
    PATH-LIN-012: "/var/run/docker.sock"

