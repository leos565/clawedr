# ── Custom deny rules ─────────────────────────────────────────────────────
# Platform-specific kernel-level enforcement rules.
# Linux rules map to BPF deny_rules in compiled_policy.json.
# macOS rules are raw Seatbelt LISP directives.

custom_deny_rules:
  macos:
    # ── Reverse-shell ports ──
    MAC-001: "(deny network-outbound (remote tcp \"*:4444\"))"
    MAC-002: "(deny network-outbound (remote tcp \"*:1337\"))"
    MAC-003: "(deny network-outbound (remote tcp \"*:5555\"))"
    MAC-004: "(deny network-outbound (remote tcp \"*:9001\"))"
    MAC-005: "(deny network-outbound (remote tcp \"*:31337\"))"

    # ── Dangerous macOS-specific tools ──
    # AppleScript — full GUI/app control, keystroke injection
    MAC-006: "(deny process-exec (literal \"/usr/bin/osascript\"))"
    # Keychain CLI — can dump stored passwords/certs
    MAC-007: "(deny process-exec (literal \"/usr/bin/security\"))"
    # Directory Services — create/modify/delete users
    MAC-008: "(deny process-exec (literal \"/usr/bin/dscl\"))"
    MAC-009: "(deny process-exec (literal \"/usr/sbin/dseditgroup\"))"
    # Network configuration
    MAC-010: "(deny process-exec (literal \"/usr/bin/networksetup\"))"
    # MDM profiles — install/remove management profiles
    MAC-011: "(deny process-exec (literal \"/usr/bin/profiles\"))"
    # System settings changes
    MAC-012: "(deny process-exec (literal \"/usr/sbin/systemsetup\"))"
    # Gatekeeper / SIP policy
    MAC-013: "(deny process-exec (literal \"/usr/sbin/spctl\"))"
    # Screencapture — privacy/exfiltration concern
    MAC-014: "(deny process-exec (literal \"/usr/sbin/screencapture\"))"
    MAC-015: "(deny process-exec (literal \"/usr/bin/screencapture\"))"
    # Firewall control
    MAC-016: "(deny process-exec (literal \"/usr/libexec/ApplicationFirewall/socketfilterfw\"))"
    # Remote management
    MAC-017: "(deny process-exec (literal \"/System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart\"))"

    # ── Network bind: deny all, allow localhost (OpenClaw gateway needs loopback) ──
    MAC-018: "(deny network-bind (local ip \"*:*\"))"
    MAC-019: "(allow network-bind (local ip \"localhost:*\"))"
    # system-socket removed: blocks gateway host resolution (causes bind=loopback -> 0.0.0.0)

  linux:
    # ── Reverse shells ──
    LIN-001:
      rule: "block_reverse_shell_4444"
      match: "connect"
      port: 4444
      action: "SIGKILL"
    LIN-002:
      rule: "block_reverse_shell_1337"
      match: "connect"
      port: 1337
      action: "SIGKILL"

    # ── Crypto mining signatures ──
    # Scope to non-shell executables to avoid matching echo/printf commands.
    LIN-003:
      rule: "crypto_stratum_tcp"
      match: "* --url *stratum+tcp://*"
      action: "SIGKILL"
    LIN-004:
      rule: "crypto_stratum_tcp2"
      match: "* -o stratum+tcp://*"
      action: "SIGKILL"
    LIN-005:
      rule: "crypto_stratum_ssl"
      match: "* --url *stratum+ssl://*"
      action: "SIGKILL"
    LIN-006:
      rule: "crypto_stratum_ssl2"
      match: "* -o stratum+ssl://*"
      action: "SIGKILL"
    LIN-007:
      rule: "crypto_donate_level"
      match: "--donate-level="
      action: "SIGKILL"
    LIN-008:
      rule: "crypto_threads_hint"
      match: "--cpu-max-threads-hint"
      action: "SIGKILL"
    LIN-009:
      rule: "crypto_algo_rx"
      match: "--algo=rx/0"
      action: "SIGKILL"
    LIN-010:
      rule: "crypto_pool_arg"
      match: "-o pool."
      action: "SIGKILL"

    # ── Credential theft ──
    LIN-011:
      rule: "id_theft_cat_ssh"
      match: "cat ~/.ssh/id_rsa"
      action: "SIGKILL"
    LIN-012:
      rule: "id_theft_cat_aws"
      match: "cat ~/.aws/credentials"
      action: "SIGKILL"
    LIN-013:
      rule: "id_theft_curl_ssh"
      match: "curl -T ~/.ssh/id_rsa"
      action: "SIGKILL"
    LIN-014:
      rule: "id_theft_tar_ssh"
      match: "tar * -czf * ~/.ssh*"
      action: "SIGKILL"
    LIN-015:
      rule: "id_theft_zip_aws"
      match: "zip * -r * ~/.aws*"
      action: "SIGKILL"
    LIN-016:
      rule: "id_theft_tar_kube"
      match: "tar * -czf * ~/.kube*"
      action: "SIGKILL"

    # ── Obfuscated execution ──
    LIN-017:
      rule: "obfuscation_base64_sh"
      match: "* | base64 -d | sh"
      action: "SIGKILL"
    LIN-018:
      rule: "obfuscation_base64_bash"
      match: "* | base64 -d | bash"
      action: "SIGKILL"
    LIN-019:
      rule: "obfuscation_base64_decode_sh"
      match: "* | base64 --decode | sh"
      action: "SIGKILL"
    LIN-020:
      rule: "obfuscation_python_base64"
      match: 'python -c "import base64*"'
      action: "SIGKILL"
    LIN-021:
      rule: "obfuscation_node_eval"
      match: "node -e * child_process*"
      action: "SIGKILL"

    # ── Remote code execution ──
    LIN-022:
      rule: "rce_curl_bash"
      match: "curl -sL * | bash"
      action: "SIGKILL"
    LIN-023:
      rule: "rce_curl_sh"
      match: "curl -sL * | sh"
      action: "SIGKILL"
    LIN-024:
      rule: "rce_wget_bash"
      match: "wget -qO- * | bash"
      action: "SIGKILL"
    LIN-025:
      rule: "rce_wget_sh"
      match: "wget -qO- * | sh"
      action: "SIGKILL"

    # ── Exfiltration ──
    LIN-026:
      rule: "exfil_curl_pastebin"
      match: "curl -F * https://pastebin.com/api/"
      action: "SIGKILL"
    LIN-027:
      rule: "exfil_nc_termbin"
      match: "nc termbin.com 9999"
      action: "SIGKILL"
    LIN-028:
      rule: "exfil_tar_git"
      match: "tar -czf * .git/"
      action: "SIGKILL"
    LIN-029:
      rule: "exfil_grep_aws_git"
      match: 'grep -r "AKIA" .git/'
      action: "SIGKILL"

    # ── Self-protection ──
    LIN-030:
      rule: "protection_kill_clawedr"
      match: "kill* clawedr"
      action: "SIGKILL"
    LIN-031:
      rule: "protection_pkill_clawedr"
      match: "pkill* clawedr"
      action: "SIGKILL"
    LIN-032:
      rule: "protection_systemctl_stop_clawedr"
      match: "systemctl stop clawedr"
      action: "SIGKILL"
    LIN-033:
      rule: "protection_rm_policy"
      match: "rm * compiled_policy.json"
      action: "SIGKILL"

    # ── Persistence ──
    LIN-034:
      rule: "persistence_echo_bashrc"
      match: "echo * >> ~/.bashrc"
      action: "SIGKILL"
    LIN-035:
      rule: "persistence_echo_crontab"
      match: "echo * >> /etc/crontab"
      action: "SIGKILL"
    LIN-036:
      rule: "persistence_authorized_keys"
      match: "echo *ssh-rsa* >> ~/.ssh/authorized_keys"
      action: "SIGKILL"
    LIN-037:
      rule: "persistence_ld_preload"
      match: "echo * > /etc/ld.so.preload"
      action: "SIGKILL"
    LIN-038:
      rule: "persistence_add_root_user"
      match: "echo *root:x:0:0* >> /etc/passwd"
      action: "SIGKILL"

    # ── Evasion ──
    LIN-039:
      rule: "evasion_setenforce_0"
      match: "setenforce 0"
      action: "SIGKILL"
    LIN-040:
      rule: "evasion_apparmor_unload"
      match: "apparmor_parser -R *"
      action: "SIGKILL"
    LIN-041:
      rule: "evasion_rm_logs"
      match: "rm -rf /var/log/*"
      action: "SIGKILL"
    LIN-042:
      rule: "evasion_history_c"
      match: "history -c"
      action: "SIGKILL"

    # ── Cloud metadata / SSRF ──
    LIN-043:
      rule: "recon_aws_imds"
      match: "curl * 169.254.169.254/latest/meta-data/*"
      action: "SIGKILL"
    LIN-044:
      rule: "recon_gcp_metadata"
      match: "curl * metadata.google.internal*"
      action: "SIGKILL"

    # ── Container escape ──
    LIN-045:
      rule: "escape_docker_sock"
      match: "curl --unix-socket /var/run/docker.sock *"
      action: "SIGKILL"
    LIN-046:
      rule: "escape_cgroups_release_agent"
      match: "echo * > /sys/fs/cgroup/memory/release_agent"
      action: "SIGKILL"
    LIN-047:
      rule: "escape_kubelet_api"
      match: "curl * http://localhost:10255/pods"
      action: "SIGKILL"

    # ── Privilege escalation recon ──
    LIN-048:
      rule: "recon_find_suid"
      match: "find / -perm -4000"
      executable: "find"  # only match when comm is find, not bash -c or alert
      action: "SIGKILL"
    LIN-049:
      rule: "recon_getcap"
      match: "getcap -r /"
      action: "SIGKILL"

# ── Heuristics ────────────────────────────────────────────────────────────
# Behavioral detection rules for AI agent skill abuse.
# Enforcement hierarchy per rule: disabled → alert → enforce
# On Linux, monitor.py reads these and populates eBPF maps for stateful tracking.
# On macOS, most heuristics are NOT FEASIBLE (Seatbelt is stateless).

heuristics:
  # ── Gog (Google Workspace) ──
  HEU-GOG-001:
    name: "Mass Email Exfiltration (Forwarding Loop)"
    description: "Agent executes gog gmail send/forward >20 times in 10s."
    action: "enforce"
    threshold: 20
    window_seconds: 10
  HEU-GOG-002:
    name: "The Inbox Purge"
    description: "Agent runs destructive gmail operations (trash/delete) with broad queries (is:inbox)."
    action: "enforce"
    threshold: 1
    window_seconds: 0
  HEU-GOG-003:
    name: "Mass Drive Scraping"
    description: "Agent downloads >50 Drive files in 10s via gog drive download."
    action: "enforce"
    threshold: 50
    window_seconds: 10
  HEU-GOG-004:
    name: "Unauthorized OAuth Scopes"
    description: "Agent escalates gog auth with admin/sensitive scopes in argv."
