# ClawEDR Master Rules — Source of Truth
# Manual overrides and baseline policy definitions.
# The Threat Aggregator merges community intel ON TOP of these rules.
#
# Structure:
#   blocked_paths        — files/dirs the agent must never read/write (per-OS)
#   blocked_domains      — hostnames the agent must never contact
#   blocked_executables  — binaries that should be SIGKILL'd on execve
#   malicious_hashes     — SHA-256 hashes of known-bad files
#   custom_deny_rules    — platform-specific kernel policy rules

version: "2.0"

# ── Blocked paths ──────────────────────────────────────────────────────────
# Sensitive credential stores and system files an AI agent should never touch.

blocked_paths:
  macos:
    # Credential stores
    - "~/.ssh"
    - "~/.gnupg"
    - "~/.aws"
    - "~/.azure"
    - "~/.config/gcloud"
    - "~/.kube/config"
    - "~/Library/Keychains"
    - "/etc/master.passwd"
    # Browser credential / cookie databases
    - "~/Library/Cookies"
    - "~/Library/Application Support/Google/Chrome/Default/Login Data"
    - "~/Library/Application Support/Google/Chrome/Default/Cookies"
    - "~/Library/Application Support/Firefox/Profiles"
    - "~/Library/Application Support/Arc/User Data/Default/Login Data"
    # Private user data
    - "~/Library/Messages"
    - "~/Library/Mail"
    - "~/Library/Accounts"
    - "~/Library/Calendars"
    - "~/Library/Suggestions"
    # System
    - "/Library/Preferences/SystemConfiguration"
  linux:
    - "/root/.ssh"
    - "/etc/shadow"
    - "/etc/passwd"
    - "/etc/sudoers"
    - "/etc/sudoers.d"
    - "/home/*/.ssh"
    - "/home/*/.gnupg"
    - "/home/*/.aws"
    - "/home/*/.azure"
    - "/home/*/.config/gcloud"
    - "/home/*/.kube/config"
    - "/var/run/docker.sock"

# ── Blocked domains ───────────────────────────────────────────────────────
# Known mining pools and C2 infrastructure. The threat feed adds more.

blocked_domains:
  # Crypto mining pools
  - "pool.supportxmr.com"
  - "pool.minexmr.com"
  - "xmr.pool.minergate.com"
  - "monerohash.com"
  - "minexmr.com"
  - "nanopool.org"
  - "mine.zergpool.com"
  - "xmr.2miners.com"
  - "pool.hashvault.pro"
  - "c3pool.com"
  - "f2pool.com"
  - "antpool.com"
  - "ethermine.org"
  - "slushpool.com"
  - "poolin.me"
  # Exfiltration endpoints
  - "pastebin.com"
  - "termbin.com"
  - "transfer.sh"
  - "file.io"
  - "0x0.st"

# ── Blocked executables ───────────────────────────────────────────────────
# Binaries an agent has no legitimate reason to run.

blocked_executables:
  # Reverse-shell / lateral movement
  - "nc"
  - "ncat"
  - "socat"
  # Network recon
  - "nmap"
  - "masscan"
  - "arp-scan"
  # Crypto miners
  - "xmrig"
  - "minerd"
  - "cgminer"
  - "cpuminer"
  - "ethminer"
  - "xmr-stak"
  - "hellminer"
  - "nanominer"
  - "phoenixminer"
  - "teamredminer"
  - "lolminer"
  - "t-rex"
  - "nbminer"
  - "gminer"
  - "srbminer"
  # Credential dumping
  - "mimikatz"
  - "secretsdump"
  # Debuggers / injectors (no legit agent use)
  - "gdb"
  - "strace"
  - "ltrace"
  - "ptrace"

malicious_hashes: []

# ── Custom deny rules ─────────────────────────────────────────────────────
# Platform-specific kernel-level enforcement rules.
# Linux rules map to BPF deny_rules in compiled_policy.json.
# macOS rules are raw Seatbelt LISP directives.

custom_deny_rules:
  macos:
    # ── Reverse-shell ports ──
    - "(deny network-outbound (remote tcp \"*:4444\"))"
    - "(deny network-outbound (remote tcp \"*:1337\"))"
    - "(deny network-outbound (remote tcp \"*:5555\"))"
    - "(deny network-outbound (remote tcp \"*:9001\"))"
    - "(deny network-outbound (remote tcp \"*:31337\"))"

    # ── Dangerous macOS-specific tools ──
    # AppleScript — full GUI/app control, keystroke injection
    - "(deny process-exec (literal \"/usr/bin/osascript\"))"
    # Keychain CLI — can dump stored passwords/certs
    - "(deny process-exec (literal \"/usr/bin/security\"))"
    # Directory Services — create/modify/delete users
    - "(deny process-exec (literal \"/usr/bin/dscl\"))"
    - "(deny process-exec (literal \"/usr/sbin/dseditgroup\"))"
    # Network configuration
    - "(deny process-exec (literal \"/usr/bin/networksetup\"))"
    # MDM profiles — install/remove management profiles
    - "(deny process-exec (literal \"/usr/bin/profiles\"))"
    # System settings changes
    - "(deny process-exec (literal \"/usr/sbin/systemsetup\"))"
    # Gatekeeper / SIP policy
    - "(deny process-exec (literal \"/usr/sbin/spctl\"))"
    # Screencapture — privacy/exfiltration concern
    - "(deny process-exec (literal \"/usr/sbin/screencapture\"))"
    - "(deny process-exec (literal \"/usr/bin/screencapture\"))"
    # Firewall control
    - "(deny process-exec (literal \"/usr/libexec/ApplicationFirewall/socketfilterfw\"))"
    # Remote management
    - "(deny process-exec (literal \"/System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart\"))"

    # ── Raw sockets (prevents packet sniffing / crafting) ──
    # Deny all bind, then allow loopback (OpenClaw gateway needs 127.0.0.1)
    - "(deny network-bind (local ip \"*:*\"))"
    - "(allow network-bind (local ip \"127.0.0.1:*\"))"
    - "(allow network-bind (local ip \"[::1]:*\"))"
    - "(deny system-socket)"

  linux:
    # ── Reverse shells ──
    - rule: "block_reverse_shell_4444"
      match: "connect"
      port: 4444
      action: "SIGKILL"
    - rule: "block_reverse_shell_1337"
      match: "connect"
      port: 1337
      action: "SIGKILL"

    # ── Crypto mining signatures ──
    # Scope to non-shell executables to avoid matching echo/printf commands.
    - rule: "crypto_stratum_tcp"
      match: "* --url *stratum+tcp://*"
      action: "SIGKILL"
    - rule: "crypto_stratum_tcp2"
      match: "* -o stratum+tcp://*"
      action: "SIGKILL"
    - rule: "crypto_stratum_ssl"
      match: "* --url *stratum+ssl://*"
      action: "SIGKILL"
    - rule: "crypto_stratum_ssl2"
      match: "* -o stratum+ssl://*"
      action: "SIGKILL"
    - rule: "crypto_donate_level"
      match: "--donate-level="
      action: "SIGKILL"
    - rule: "crypto_threads_hint"
      match: "--cpu-max-threads-hint"
      action: "SIGKILL"
    - rule: "crypto_algo_rx"
      match: "--algo=rx/0"
      action: "SIGKILL"
    - rule: "crypto_pool_arg"
      match: "-o pool."
      action: "SIGKILL"

    # ── Credential theft ──
    - rule: "id_theft_cat_ssh"
      match: "cat ~/.ssh/id_rsa"
      action: "SIGKILL"
    - rule: "id_theft_cat_aws"
      match: "cat ~/.aws/credentials"
      action: "SIGKILL"
    - rule: "id_theft_curl_ssh"
      match: "curl -T ~/.ssh/id_rsa"
      action: "SIGKILL"
    - rule: "id_theft_tar_ssh"
      match: "tar * -czf * ~/.ssh*"
      action: "SIGKILL"
    - rule: "id_theft_zip_aws"
      match: "zip * -r * ~/.aws*"
      action: "SIGKILL"
    - rule: "id_theft_tar_kube"
      match: "tar * -czf * ~/.kube*"
      action: "SIGKILL"

    # ── Obfuscated execution ──
    - rule: "obfuscation_base64_sh"
      match: "* | base64 -d | sh"
      action: "SIGKILL"
    - rule: "obfuscation_base64_bash"
      match: "* | base64 -d | bash"
      action: "SIGKILL"
    - rule: "obfuscation_base64_decode_sh"
      match: "* | base64 --decode | sh"
      action: "SIGKILL"
    - rule: "obfuscation_python_base64"
      match: 'python -c "import base64*"'
      action: "SIGKILL"
    - rule: "obfuscation_node_eval"
      match: "node -e * child_process*"
      action: "SIGKILL"

    # ── Remote code execution ──
    - rule: "rce_curl_bash"
      match: "curl -sL * | bash"
      action: "SIGKILL"
    - rule: "rce_curl_sh"
      match: "curl -sL * | sh"
      action: "SIGKILL"
    - rule: "rce_wget_bash"
      match: "wget -qO- * | bash"
      action: "SIGKILL"
    - rule: "rce_wget_sh"
      match: "wget -qO- * | sh"
      action: "SIGKILL"

    # ── Exfiltration ──
    - rule: "exfil_curl_pastebin"
      match: "curl -F * https://pastebin.com/api/"
      action: "SIGKILL"
    - rule: "exfil_nc_termbin"
      match: "nc termbin.com 9999"
      action: "SIGKILL"
    - rule: "exfil_tar_git"
      match: "tar -czf * .git/"
      action: "SIGKILL"
    - rule: "exfil_grep_aws_git"
      match: 'grep -r "AKIA" .git/'
      action: "SIGKILL"

    # ── Self-protection ──
    - rule: "protection_kill_clawedr"
      match: "kill* clawedr"
      action: "SIGKILL"
    - rule: "protection_pkill_clawedr"
      match: "pkill* clawedr"
      action: "SIGKILL"
    - rule: "protection_systemctl_stop_clawedr"
      match: "systemctl stop clawedr"
      action: "SIGKILL"
    - rule: "protection_rm_policy"
      match: "rm * compiled_policy.json"
      action: "SIGKILL"

    # ── Persistence ──
    - rule: "persistence_echo_bashrc"
      match: "echo * >> ~/.bashrc"
      action: "SIGKILL"
    - rule: "persistence_echo_crontab"
      match: "echo * >> /etc/crontab"
      action: "SIGKILL"
    - rule: "persistence_authorized_keys"
      match: "echo *ssh-rsa* >> ~/.ssh/authorized_keys"
      action: "SIGKILL"
    - rule: "persistence_ld_preload"
      match: "echo * > /etc/ld.so.preload"
      action: "SIGKILL"
    - rule: "persistence_add_root_user"
      match: "echo *root:x:0:0* >> /etc/passwd"
      action: "SIGKILL"

    # ── Evasion ──
    - rule: "evasion_setenforce_0"
      match: "setenforce 0"
      action: "SIGKILL"
    - rule: "evasion_apparmor_unload"
      match: "apparmor_parser -R *"
      action: "SIGKILL"
    - rule: "evasion_rm_logs"
      match: "rm -rf /var/log/*"
      action: "SIGKILL"
    - rule: "evasion_history_c"
      match: "history -c"
      action: "SIGKILL"

    # ── Cloud metadata / SSRF ──
    - rule: "recon_aws_imds"
      match: "curl * 169.254.169.254/latest/meta-data/*"
      action: "SIGKILL"
    - rule: "recon_gcp_metadata"
      match: "curl * metadata.google.internal*"
      action: "SIGKILL"

    # ── Container escape ──
    - rule: "escape_docker_sock"
      match: "curl --unix-socket /var/run/docker.sock *"
      action: "SIGKILL"
    - rule: "escape_cgroups_release_agent"
      match: "echo * > /sys/fs/cgroup/memory/release_agent"
      action: "SIGKILL"
    - rule: "escape_kubelet_api"
      match: "curl * http://localhost:10255/pods"
      action: "SIGKILL"

    # ── Privilege escalation recon ──
    - rule: "recon_find_suid"
      match: "find / -perm -4000"
      action: "SIGKILL"
    - rule: "recon_getcap"
      match: "getcap -r /"
      action: "SIGKILL"
